{% extends "main/layout.html" %}
{% load static %}

{% block content %}

<section class="content d-flex align-items-center justify-content-center" style="min-height: 90vh; background: #f4f6f9;">

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-12">

        <div class="card border-0 shadow-lg text-center p-4" style="border-radius: 15px;">
          
          <!-- HEADER -->
          <div class="mb-3">
            <h5 class="text-uppercase font-weight-bold text-muted mb-2" style="letter-spacing: 1px;">
              Ministério do Desenvolvimento Rural e Habitação Comunitária
            </h5>
          </div>

          <hr>

          <!-- TITLE -->
          <div class="mb-3">
            <h3 class="font-weight-bold" style="letter-spacing: 2px;">
              SISTEMA MANAGEMENT ASSETS
            </h3>
          </div>

          <!-- LOGO -->
          <div class="my-4">
            <img src="{% static 'Image/MDHRC.png' %}" 
                 alt="MDRHC Logo" 
                 class="img-fluid"
                 style="max-height: 120px; object-fit: contain;">
          </div>

          <hr>

          <!-- WELCOME -->
          <div class="mt-3">
            <h4 class="font-weight-bold mb-2">Bemvindo</h4>

            <p class="text-muted mb-3">
              Sistema Jestaun Assets no Monitorizasaun
            </p>

          </div>

        </div>

      </div>
    </div>
  </div>

</section>

{% endblock %}
